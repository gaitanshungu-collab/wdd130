<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    <meta name="description"
      content="This will collect the information of the user, if she he is interested with us">
    <meta name="author" content="Shungu Gaitan">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/therapidssplash.jpg" alt="This is the company Logo" class="logo">

        <nav>
            <a href="index.html"> Home</a>
            <a href="about.html"> About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="company-info">
            <h1>Water Rafting Company</h1>
            <p>123 main River Town</p>
            <p>Dodoma, Kizota</p>
            <p>+255 653 442 044</p>
            <p>dodomaga@rafting.co.uk</p>
        </section>
        <section class="contact-container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3335.599244790689!2d35.724156401439735!3d-6.168456368049691!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2stz!4v1781282696399!5m2!1sen!2stz"
                  width="400" height="300" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="form-row">
                    <label for="q1">Name</label>
                    <input type="text" id="q1" placeholder="Shungu Gaitan" name="q1"><br>
                </div>

                <div class="form-row">
                    <label for="email">Email </label>
                    <input type="email" id="email" placeholder="allan@gmail.com" name="email"><br>
                </div>

                <div class="purpose-row">
                    <div class="purpose-label">
                        <label>Purpose of the message</label>
                    </div>

                    <div class="purpose-option">
                        <div class="radio-group">
                            <input type="radio" id="gi" name="message">
                            <label for="gi">General Inqury</label>
                        </div>

                        <div class="radio-group">
                            <input type="radio" id="rq" name="message">
                            <label for="rq">Reservation question</label>
                        </div>

                        <div class="radio-group">
                            <input type="radio" id="ws" name="message">
                            <label for="ws">Website Suggestion</label>
                        </div>
                    </div>
                </div>
                <div class="message">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="type here" name="message"></textarea>
                </div>
                <div class="subscribe-row">

                    <input type="checkbox" id="ch" name="subscribe">
                    <label for="ch">Please Subscribe me to the Monthly Newsletter</label>
                </div>
                <div class="submit">
                    <button type="submit">Get in Touch</button>
                </div>
            </form>
        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employees-image">

                <figure>
                    <img src="images/adventure3.jpg" alt="The place to enjoy">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/adventure4.jpg" alt="never boaring">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/adventures5.webp" alt="dont plan to miss">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p class="copyright">© 2026 Unstoppable team by Shungu gaitan </p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/fbicon.png" alt="the facebook page" width="100">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="instagram pages" width="180">
            </a>
            <a href="https://linkeldin.com">
                <img src="images/linkedin.png" alt="linkedin pages" width="100">
            </a>
        </nav>
    </footer>
</body>

</html>
