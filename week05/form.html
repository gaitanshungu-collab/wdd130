<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz asked questions</title>
    <link rel="stylesheet" href="styles/form.css">
</head>

<body>
    <main class="box">
        <h1>FORM YA MASWALI</h1>
        <form class="box">
            <div class="quiz-test box">
                <label for="q1">1. Umependaje mafunzo haya?</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-test box">
                <label for="q2">2. Lini unapendaje kuimba sana hivi?</label>
                <textarea id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-test box">
                <label for="q3">3.Kip ni kitamu kati ya hivi</label>
                <select id="q3" name="q3">
                    <option value="" select disabled>&lt;choose one&gt;</option>
                    <option value="chips">&lt; Chips Kuku &gt;</option>
                    <option value="mahindi">&lt;Con Staff &gt;</option>
                    <option value="nyama choma">&lt; Nyama Choma &gt;</option>
                    <option value="Ugali">&lt; Ugali mzuri &gt;</option>
                </select>
                <div class="quiz-test box">
                    <label for="q4">4. Provide the margin for this?</label>
                    <code class="box">Margin: 10px 5px 15px;</code>
                    <input type="number" id="q4" name="q4">
                </div>
                <button type="submit">Submit Quiz</button>
            </div>
        </form>
    </main>
</body>

</html>
